name: Deploy ClaudeDocs to GitHub Pages

# Publishes everything in the ClaudeDocs/ folder as a static website.
# Runs automatically whenever ClaudeDocs changes on the master branch,
# and can also be triggered by hand from the Actions tab.

on:
  push:
    branches: [master]
    paths:
      - 'ClaudeDocs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Permissions the deploy needs (nothing more).
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer pushes cancel an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload the ClaudeDocs folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: ClaudeDocs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
